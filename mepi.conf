# mepi pipeline configuration file
# Values use Python literal syntax: strings in quotes, dicts/lists with braces/brackets.
# Inline comments are supported.

# ── Input / output measurement sets ──────────────────────────────────────────
ms_full     = 'RawData/a2163-flipped.MS/'   # raw full MS
path_ms     = 'MS_Files/'                   # path to store MS files
path_plots  = 'Plots/'                      # path to store plots
path_imgs   = 'Images/'                     # path to store images
path_logs   = 'Logs/'                       # path to store logs
path_sols   = 'Solutions/'                  # path to store calibration tables

# ── Array / averaging settings ────────────────────────────────────────────────
ref_ant  = 'm063'                            # not mandatory
freqbin  = 4                                 # channels to average in target split
timebin  = '0s'                              # time binning (0s = no averaging)

# steps to run in order; options: 'crosscal', 'splittgt', 'selfcal' / 'selfcaldp3' / 'facetselfcal'
pipeline_steps = ['crosscal', 'splittgt', 'selfcal'] 